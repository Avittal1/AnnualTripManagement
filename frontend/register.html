<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="register.css">
    <title>הרשמה</title>
</head>

<body>
  <h3>נא הזן פרטי הרשמה</h3>

   <div class="st">
    <form id="registerForm">
      <label for="fname">שם פרטי:</label><br>
      <input type="text" id="fname" name="fname" placeholder='גילה'><br>
      <p id="fnameError" class="error"></p>

      <label for="lname">שם משפחה:</label><br>
      <input type="text" id="lname" name="lname" placeholder="כהן"><br>
      <p id="lnameError" class="error"></p>

      <label for="class">כיתה:</label><br>
      <input type="text" id="class" name="class" placeholder="א"><br>
      <p id="classError" class="error"></p>

      <label for="id">ת.ז:</label><br>
      <input type="text" id="id" name="id" maxlength="9"><br>
      <p>(9 ספרות)</p>
      <p id="idError" class="error"></p>

      <label>תפקיד:</label><br>

      <label><input type="radio" name="role" value="תלמידה"> תלמידה</label>
      <label><input type="radio" name="role" value="מורה"> מורה</label>

      <p id="roleError" class="error"></p>


    <!-- שדות שמופיעים רק לתלמידה -->
    <div id="studentExtraFields" style="display: none;">
      <label for="tid">ת.ז של המורה האחראית:</label><br>
      <input type="text" id="tid" maxlength="9"><br>
      <p id="tidError" class="error"></p>
      
      <label for="status">סטטוס:</label><br>
      <input list="status_list" id="status" name="status" placeholder="בחר/י מהרשימה">
      <datalist id="status_list">
        <option value="נוכחת">
        <option value="חסרה">
      </datalist>
      <p id="statusError" class="error"></p>
    </div>

    <p id="result"></p>

      <br>
     <input type="submit" value="שמירה">
    </form>
   </div>

   <p><a href="index.html" class="home" style="text-decoration:none">חזרה לדף בית</a></p>

   <script src="register.js"></script>
  </body>
</html>
